########################################################################################################################


name: Build + Push + Deploy Fullstack to GKE

on:
  workflow_dispatch:

# on:
#   push:
#     branches:
#       - main

# =========================
# GLOBAL ENV (FIXED)
# =========================
env:
  GCP_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  REPO_PREFIX: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GOOGLE_PROJECT }}
  IMAGE_TAG: ${{ github.run_number }}
  CLUSTER_NAME: ${{ secrets.GKE_CLUSTER_NAME }}
  CLUSTER_REGION: ${{ secrets.GKE_REGION }}

jobs:

  # =========================
  # NORMAL DEPLOY FLOW
  # =========================
  deploy:
    if: ${{ !contains(github.event.head_commit.message, 'rollback') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AUTH
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Configure Docker
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      # BACKEND
      - name: Build and Push Backend
        run: |
          docker build -t ${REPO_PREFIX}/backend/backend:${IMAGE_TAG} ./backend
          docker push ${REPO_PREFIX}/backend/backend:${IMAGE_TAG}

      # FRONTEND
      - name: Build and Push Frontend
        run: |
          docker build -t ${REPO_PREFIX}/frontend/frontend:${IMAGE_TAG} ./frontend
          docker push ${REPO_PREFIX}/frontend/frontend:${IMAGE_TAG}

      # DEPLOY
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${CLUSTER_NAME} --region ${CLUSTER_REGION}

      - name: Deploy Manifests
        run: |
          kubectl apply -f manifests/back-deployment.yaml
          kubectl apply -f manifests/front-deployment.yaml


  # =========================
  # ROLLBACK FLOW
  # =========================
  rollback:
    if: ${{ contains(github.event.head_commit.message, 'rollback') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AUTH
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      # CONNECT TO CLUSTER
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${CLUSTER_NAME} --region ${CLUSTER_REGION}

      # ROLLBACK DEPLOY
      - name: Rollback Deployment
        run: |
          echo "⚠️ Rollback triggered from commit message"
          kubectl apply -f manifests/back-deployment.yaml
          kubectl apply -f manifests/front-deployment.yaml